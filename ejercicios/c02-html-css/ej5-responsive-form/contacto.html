<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Contacto</title>
</head>
<body>

    <nav class="sidebar">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="estudios.html">Estudios</a></li>
            <li><a href="experiencia.html">Experiencia</a></li>
            <li><a href="hobbies.html">Hobbies</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <h2 class="titulos-sidebar">Contacto</h2>
        <form class="formulario">
    
            <label for="nombre">Nombre <strong>*</strong></label>
            <input type="text" id="nombre" name="nombre" required minlength="3">

            <label for="email">Email <strong>*</strong></label>
            <input type="email" id="email" name="email" required>

            <label for="asunto">Asunto <strong>*</strong></label>
            <input type="text" id="asunto" name="asunto" required>

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}">

            <label for="mensaje">Mensaje <strong>*</strong></label>
            <textarea id="mensaje" name="mensaje" required minlength="10"></textarea>

            <button type="submit">Enviar</button>

        </form>
    </main>
    
</body>
</html>
